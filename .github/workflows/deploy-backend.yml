name: Deploy Backend to Vultr

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Vultr VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_BACKEND_HOST }}
          username: ${{ secrets.VULTR_BACKEND_USER }}
          password: ${{ secrets.VULTR_SSH_PASSWORD }}
          script: |
            # Подготавливаем папку на сервере
            mkdir -p /var/www/yappi-sushi
            
      - name: Copy files to Vultr VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VULTR_BACKEND_HOST }}
          username: ${{ secrets.VULTR_BACKEND_USER }}
          password: ${{ secrets.VULTR_SSH_PASSWORD }}
          source: "."
          target: "/var/www/yappi-sushi/"
          
      - name: Install dependencies and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_BACKEND_HOST }}
          username: ${{ secrets.VULTR_BACKEND_USER }}
          password: ${{ secrets.VULTR_SSH_PASSWORD }}
          script: |
            cd /var/www/yappi-sushi/backend

            npm install

            echo "DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "PORT=4000" >> .env
            echo "NODE_ENV=production" >> .env
            echo "ALLOWED_ORIGINS=https://yappisushi.ee,https://www.yappisushi.ee" >> .env

            npx prisma generate
            npx prisma migrate deploy

            pm2 restart yappi-backend --update-env || pm2 start src/app.ts --interpreter ./node_modules/.bin/ts-node --name "yappi-backend"
