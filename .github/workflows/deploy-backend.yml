name: Deploy Backend to Vultr

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Vultr VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_BACKEND_HOST }}
          username: ${{ secrets.VULTR_BACKEND_USER }}
          password: ${{ secrets.VULTR_SSH_PASSWORD }}
          script: |
            # Подготавливаем папку на сервере
            mkdir -p /var/www/yappi-sushi
            
      - name: Copy files to Vultr VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VULTR_BACKEND_HOST }}
          username: ${{ secrets.VULTR_BACKEND_USER }}
          password: ${{ secrets.VULTR_SSH_PASSWORD }}
          source: "."
          target: "/var/www/yappi-sushi/"
          
      - name: Install dependencies and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_BACKEND_HOST }}
          username: ${{ secrets.VULTR_BACKEND_USER }}
          password: ${{ secrets.VULTR_SSH_PASSWORD }}
          script: |
            cd /var/www/yappi-sushi/backend
            
            # Устанавливаем зависимости
            npm install
            
            # Создаем или обновляем .env файл на сервере (заменяем секретом из GitHub)
            echo "DATABASE_URL=\"postgresql://yappi:yappi_secure_2026@localhost:5432/yappisushi?schema=public\"" > .env
            echo "PORT=3001" >> .env
            
            # Генерируем клиент Prisma и применяем миграции
            npx prisma generate
            npx prisma migrate deploy
            
            # Перезапускаем PM2 или просто node
            pm2 restart yappi-backend || pm2 start src/app.ts --interpreter ./node_modules/.bin/ts-node --name "yappi-backend"
